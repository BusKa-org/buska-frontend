name: Android Release APK (Signed)

on:
  push:
    tags:
      - 'v*'  # Executa quando criar uma tag como v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Decodifica o keystore do GitHub Secrets (base64)
      - name: Decode Keystore
        continue-on-error: true
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "✅ Keystore decodificado"
          else
            echo "⚠️ KEYSTORE_BASE64 não configurado, usando debug keystore"
          fi

      # Cria arquivo de propriedades para assinatura
      - name: Create keystore properties
        continue-on-error: true
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ] && [ -n "$KEY_ALIAS" ]; then
            cat > android/keystore.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF
            echo "✅ Propriedades do keystore criadas"
          else
            echo "⚠️ Secrets do keystore não configurados completamente"
          fi

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Check keystore configuration
        run: |
          if [ -f "android/app/release.keystore" ]; then
            echo "✅ Usando keystore de produção"
          else
            echo "⚠️ Usando assinatura de debug (keystore não configurado)"
          fi

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/buska-${VERSION}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: buska-release-${{ github.event.inputs.version || github.ref_name }}
          path: android/app/build/outputs/apk/release/buska-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/buska-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get APK info
        run: |
          echo "✅ APK de release gerado com sucesso!"
          echo "📦 Informações do APK:"
          ls -lh android/app/build/outputs/apk/release/buska-*.apk
          echo "📱 Versão: ${{ github.event.inputs.version || github.ref_name }}"
