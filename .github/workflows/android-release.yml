name: Android Release APK (Signed)

on:
  push:
    tags:
      - 'v*'  # Executa quando criar uma tag como v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Decodifica o keystore do GitHub Secrets (base64)
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      # Cria arquivo de propriedades para assinatura
      - name: Create keystore properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/keystore.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK (if keystore not provided)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          echo "⚠️ Usando assinatura de debug (keystore não configurado)"

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/buska-${VERSION}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: buska-release-${{ github.event.inputs.version || github.ref_name }}
          path: android/app/build/outputs/apk/release/buska-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/buska-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get APK info
        run: |
          echo "✅ APK de release gerado com sucesso!"
          echo "📦 Informações do APK:"
          ls -lh android/app/build/outputs/apk/release/buska-*.apk
          echo "📱 Versão: ${{ github.event.inputs.version || github.ref_name }}"
