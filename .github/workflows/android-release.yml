name: Android Release APK (Signed)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Build Signed Release APK
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Force the correct use of SDK
        run: |
          echo "ANDROID_SDK_ROOT=/home/ubuntu/.android/sdk" >> $GITHUB_ENV
          echo "sdk.dir=/home/ubuntu/.android/sdk" > android/local.properties

      - name: Configure Android SDK path
        run: |
          if [ -z "$ANDROID_SDK_ROOT" ] && [ -n "$ANDROID_HOME" ]; then
            echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            for d in /opt/android-sdk /usr/lib/android-sdk /usr/local/android-sdk $HOME/Android/Sdk; do
              if [ -d "$d" ]; then
                echo "ANDROID_SDK_ROOT=$d" >> "$GITHUB_ENV"
                break
              fi
            done
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            echo "Android SDK not found. Will attempt to install via setup-android."
          fi

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Setup Android SDK (if missing)
        if: env.ANDROID_SDK_ROOT == ''
        uses: android-actions/setup-android@v3

      - name: Ensure local.properties
        run: |
          if [ -z "$ANDROID_SDK_ROOT" ] && [ -n "$ANDROID_HOME" ]; then
            ANDROID_SDK_ROOT="$ANDROID_HOME"
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            echo "Android SDK still not found after setup."
            exit 1
          fi

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Validate signing secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] || [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] || [ -z "${{ secrets.KEY_PASSWORD }}" ] || [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "Missing signing secrets. Configure: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS."
            exit 1
          fi

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          echo "✅ Keystore decoded"

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release.keystore
          EOF
          echo "✅ keystore.properties created"

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew clean assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/buska-${VERSION}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: buska-release-${{ github.event.inputs.version || github.ref_name }}
          path: android/app/build/outputs/apk/release/buska-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/buska-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get APK info
        run: |
          echo "✅ Signed release APK generated!"
          ls -lh android/app/build/outputs/apk/release/buska-*.apk
