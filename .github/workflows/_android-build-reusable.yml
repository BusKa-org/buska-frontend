name: Android Build Reusable

on:
  workflow_call:
    inputs:
      GRADLE_PARAMS:
        description: 'Gradle parameters for the build'
        required: false
        default: 'Release'
        type: string
      VERSION_NAME:
        description: 'Version name (Optional - ex: 1.0.0)'
        required: false
        default: ''
        type: string
      SHOULD_GRADLE_CLEAN:
        description: 'Should run gradle clean before build'
        required: false
        default: 'false'
        type: string
      CREATE_GITHUB_RELEASE:
        description: 'Whether to create a GitHub Release'
        required: false
        default: false
        type: boolean
      DISCORD_MODE:
        description: 'Notification mode: build or release'
        required: false
        default: 'build'
        type: string
    secrets:
      DISCORD_WEBHOOK_CI:
        required: true
      DISCORD_WEBHOOK_RELEASES:
        required: false
      API_URL_PRODUCTION:
        required: false
      API_URL_DEVELOPMENT:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

jobs:
  build:
    name: ${{ inputs.GRADLE_PARAMS || 'Release' }} - ${{ github.run_number }}
    runs-on: self-hosted

    steps:
      - name: Record build start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show disk space before cleanup
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          echo
          echo "=== Largest directories in /home/ubuntu ==="
          du -h /home/ubuntu 2>/dev/null | sort -hr | head -30 || true

      - name: Cleanup safe disk usage
        run: |
          echo "Cleaning old build outputs and safe caches..."

          # Front/build outputs in workspace
          rm -rf android/app/build || true
          rm -rf android/build || true
          #rm -rf .gradle || true
          rm -rf /tmp/* || true

          echo "=== Disk space after cleanup ==="
          df -h

      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          START=$(date +%s)
          npm ci
          END=$(date +%s)
          echo "NPM_INSTALL_SECONDS=$((END - START))" >> $GITHUB_ENV
          echo "npm ci took $((END - START))s"

      - name: Setup Global Variables
        id: vars
        run: |
          TYPE="${{ inputs.GRADLE_PARAMS }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]] || [ -z "$TYPE" ]; then TYPE="Release"; fi

          REF_NAME=$(echo "${{ github.ref_name }}" | sed 's|.*/||')

          if [[ "$TYPE" == "Release" ]]; then
            VER="${{ inputs.VERSION_NAME }}"
            if [ -z "$VER" ]; then VER="$REF_NAME"; fi
            FINAL_VERSION="release-${VER}-${{ github.run_number }}"
          else
            FINAL_VERSION="debug-${REF_NAME}-${{ github.run_number }}"
          fi

          echo "BUILD_TYPE=$TYPE" >> $GITHUB_ENV
          echo "VERSION=$FINAL_VERSION" >> $GITHUB_ENV
          echo "BRANCH_NAME=$REF_NAME" >> $GITHUB_ENV
          echo "RUN_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          echo "SHOULD_GRADLE_CLEAN=${{ inputs.SHOULD_GRADLE_CLEAN || 'false' }}" >> $GITHUB_ENV

      - name: Force the correct use of SDK
        run: |
          echo "ANDROID_SDK_ROOT=/home/ubuntu/.android/sdk" >> $GITHUB_ENV
          echo "sdk.dir=/home/ubuntu/.android/sdk" > android/local.properties

      - name: Configure Android SDK (Self-Hosted)
        run: |
          if [ -z "$ANDROID_SDK_ROOT" ] && [ -n "$ANDROID_HOME" ]; then
            echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            for d in /opt/android-sdk /usr/lib/android-sdk /usr/local/android-sdk $HOME/Android/Sdk; do
              if [ -d "$d" ]; then
                echo "ANDROID_SDK_ROOT=$d" >> "$GITHUB_ENV"
                break
              fi
            done
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            echo "Android SDK not found. Will attempt to install via setup-android."
          fi

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Setup Android SDK (if missing)
        if: env.ANDROID_SDK_ROOT == ''
        uses: android-actions/setup-android@v3

      - name: Ensure local.properties
        run: |
          if [ -z "$ANDROID_SDK_ROOT" ] && [ -n "$ANDROID_HOME" ]; then
            ANDROID_SDK_ROOT="$ANDROID_HOME"
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            echo "Android SDK still not found after setup."
            exit 1
          fi

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Prepare Environment (.env)
        run: |
          if [[ "${{ env.BUILD_TYPE }}" == "Release" ]]; then
            echo "API_URL=${{ secrets.API_URL_PRODUCTION }}" > .env
            echo "APP_NAME=BusKá" >> .env
          else
            echo "API_URL=${{ secrets.API_URL_DEVELOPMENT || 'http://localhost:5000' }}" > .env
            echo "APP_NAME=BusKá Development" >> .env
          fi
          echo "✅ Single .env generated for build of ${{ env.BUILD_TYPE }}."

      - name: Configure Keystore (Conditional)
        id: signing
        run: |
          cat > android/keystore.properties << EOF
          debug.storeFile=debug.keystore
          debug.storePassword=android
          debug.keyAlias=androiddebugkey
          debug.keyPassword=android
          EOF

          if [[ "${{ env.BUILD_TYPE }}" == "Release" ]]; then
            if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
              echo "🔐 Injecting Release Keys..."
              echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/buska-release-key.keystore

              cat >> android/keystore.properties << EOF
          release.storeFile=buska-release-key.keystore
          release.storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          release.keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          release.keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
            else
              echo "❌ Release build selected but no secrets found!"
              exit 1
            fi
          else
            echo "ℹ️ Debug build selected. Skipping release keystore decoding."
          fi

      - name: Show disk space before Gradle build
        run: |
          echo "=== Disk space before Gradle build ==="
          df -h
          echo
          du -sh node_modules 2>/dev/null || true
          du -sh android 2>/dev/null || true
          du -sh $HOME/.gradle 2>/dev/null || true
          du -sh $HOME/.android 2>/dev/null || true

      - name: Build Android App
        run: |
          cd android
          chmod +x gradlew

          if [ "${SHOULD_GRADLE_CLEAN}" = "true" ]; then
            echo "Running gradle clean..."
            ./gradlew clean --no-daemon
          else
            echo "Skipping gradle clean..."
          fi

          START=$(date +%s)

          ./gradlew assemble${{ env.BUILD_TYPE }} --no-daemon \
            --max-workers=2 \
            -Dorg.gradle.caching=false \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

          END=$(date +%s)
          echo "GRADLE_BUILD_SECONDS=$((END - START))" >> $GITHUB_ENV
          echo "Gradle build took $((END - START))s"

      - name: Rename and Prepare Artifact
        id: prepare_artifact
        run: |
          ANDROID_BUILD_VARIANT=$(echo "${{ env.BUILD_TYPE }}" | tr '[:upper:]' '[:lower:]')
          echo "Android build variant: $ANDROID_BUILD_VARIANT"

          cd android/app/build/outputs/apk/$ANDROID_BUILD_VARIANT
          echo "Current directory: $(pwd)"
          ORIGINAL_APK=$(find . -name "*.apk" -maxdepth 1 | head -n 1)

          if [ -f "$ORIGINAL_APK" ]; then
            NEW_NAME="buska-${{ env.VERSION }}.apk"
            mv "$ORIGINAL_APK" "$NEW_NAME"

            echo "APK_SIZE=$(du -sh "$NEW_NAME" | cut -f1)" >> $GITHUB_ENV
            echo "ARTIFACT_PATH=$(pwd)/$NEW_NAME" >> $GITHUB_ENV
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buska-${{ env.VERSION }}
          path: ${{ env.ARTIFACT_PATH }}

      - name: Create GitHub Release
        if: inputs.CREATE_GITHUB_RELEASE == true
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ARTIFACT_PATH }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: always()
        run: |
          BUILD_END=$(date +%s)
          BUILD_TIME=$((BUILD_END - BUILD_START))
          BUILD_MIN=$((BUILD_TIME / 60))
          BUILD_SEC=$((BUILD_TIME % 60))
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/buska-${{ env.VERSION }}.apk"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APK_SIZE_FORMATTED=$(echo "${{ env.APK_SIZE }}" | sed 's/\([0-9]\)M$/\1 MB/' | sed 's/\([0-9]\)K$/\1 KB/')
          WEBHOOK=${{ secrets.DISCORD_WEBHOOK_CI }}

          MSG="**Build Information**\n**File:** \`buska-${{ env.VERSION }}.apk\`\n**Type:** \`${{ env.BUILD_TYPE }}\`\n**Size:** \`${{ env.APK_SIZE }}\`\n**Build Time:** \`${BUILD_MIN}m ${BUILD_SEC}s\`\n\n🔧 **Origin**\n**Change:** \`$COMMIT_MSG\`\n**Branch:** \`${{ env.BRANCH_NAME }}\`"

          if [ "${{ job.status }}" == "success" ]; then
            COLOR=3066993

            if [ "${{ inputs.DISCORD_MODE }}" == "release" ]; then
              TITLE="📦 BusKá ${{ github.ref_name }}"
              CONTENT="Uma nova versão do aplicativo BusKá foi gerada e publicada com sucesso.\n\n🔗 **Página da release:** $RELEASE_URL\n📦 **Download direto do APK:** $APK_URL"
              PING="@here"
              WEBHOOK=${{ secrets.DISCORD_WEBHOOK_RELEASES }}
              MSG="📱 **Informações da versão**\n**Versão:** \`${{ github.ref_name }}\`\n**Arquivo:** \`buska-${{ env.VERSION }}.apk\`\n**Tamanho:** \`$APK_SIZE_FORMATTED\`\n**Tempo de build:** \`${BUILD_MIN}m ${BUILD_SEC}s\`\n\n🔧 **Origem**\n**Branch:** \`${{ env.BRANCH_NAME }}\`\n**Commit:** \`$SHORT_SHA\`\n**URL do commit:** $COMMIT_URL\n**Autor:** \`${{ github.actor }}\`\n\n⚠️ **Observação:** caso seja a primeira instalação, pode ser necessário habilitar a instalação de aplicativos de fontes externas no Android."
            else
              TITLE="🚀 BusKá Build Update"
              CONTENT="A new BusKá build was generated successfully.\n\n📦 **Download (GitHub Actions):** $RUN_URL\n\n⚠️ **Note:** this artifact is available through GitHub Actions and may expire according to repository artifact retention settings."
              PING=""
            fi
          else
            COLOR=15158332
            TITLE="❌ BusKá Build Failure"
            CONTENT="The build failed during the pipeline execution.\n\n🔍 **Logs:** $RUN_URL"
            PING="@here"
          fi

          PAYLOAD='{
            "content": "'"$PING"'",
            "embeds": [{
              "title": "'"$TITLE"'",
              "description": "'"$MSG"'\n\n'"$CONTENT"'",
              "color": '$COLOR'
            }]
          }'

          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" $WEBHOOK

      - name: Final cleanup
        if: always()
        run: |
          echo "Cleaning build leftovers..."
          rm -rf android/app/build || true
          rm -rf android/build || true
          #rm -rf .gradle || true
          rm -rf /tmp/* || true

          echo "=== Disk space after workflow ==="
          df -h