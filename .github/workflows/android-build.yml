name: Android Build APK (Installable)

on:
  push:
    branches: [ main, develop, chore/add-ci ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Installable APK (Release)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Force the correct use of SDK
        run: |
          echo "ANDROID_SDK_ROOT=/home/ubuntu/.android/sdk" >> $GITHUB_ENV
          echo "sdk.dir=/home/ubuntu/.android/sdk" > android/local.properties

      - name: Configure Android SDK path
        run: |
          if [ -z "$ANDROID_SDK_ROOT" ] && [ -n "$ANDROID_HOME" ]; then
            echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            for d in /opt/android-sdk /usr/lib/android-sdk /usr/local/android-sdk $HOME/Android/Sdk; do
              if [ -d "$d" ]; then
                echo "ANDROID_SDK_ROOT=$d" >> "$GITHUB_ENV"
                break
              fi
            done
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            echo "Android SDK not found. Will attempt to install via setup-android."
          fi

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Setup Android SDK (if missing)
        if: env.ANDROID_SDK_ROOT == ''
        uses: android-actions/setup-android@v3

      - name: Ensure local.properties
        run: |
          if [ -z "$ANDROID_SDK_ROOT" ] && [ -n "$ANDROID_HOME" ]; then
            ANDROID_SDK_ROOT="$ANDROID_HOME"
          fi

          if [ -z "$ANDROID_SDK_ROOT" ]; then
            echo "Android SDK still not found after setup."
            exit 1
          fi

          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      # Ensure debug.keystore exists (useful if your release build falls back to debug signing in CI)
      - name: Create debug keystore (CI)
        run: |
          cd android/app
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Release APK
        run: |
          cd android
          ./gradlew clean :app:assembleRelease --no-daemon --stacktrace

      - name: List build outputs (debugging)
        run: |
          echo "=== outputs/apk ==="
          ls -R android/app/build/outputs/apk || true
          echo "=== outputs/bundle ==="
          ls -R android/app/build/outputs/bundle || true
          echo "=== find APKs ==="
          find android/app/build/outputs -type f -name "*.apk" -print || true

      - name: Locate release APK
        id: locate_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -type f -name "*release*.apk" | head -n 1)
          echo "Found APK: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found under android/app/build/outputs/apk"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify APK (aapt + apksigner)
        run: |
          sudo apt-get update
          sudo apt-get install -y apksigner

          APK="${{ steps.locate_apk.outputs.apk_path }}"
          echo "APK: $APK"

          echo "== apksigner verify =="
          apksigner verify --verbose "$APK"

          echo "== print manifest info (package/version/sdk) =="
          $ANDROID_SDK_ROOT/build-tools/*/aapt dump badging "$APK" | head -n 40

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: ${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Get APK info
        run: |
          echo "✅ Release APK generated!"
          ls -lh "${{ steps.locate_apk.outputs.apk_path }}"
