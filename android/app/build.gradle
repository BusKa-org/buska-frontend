apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

import java.util.Properties

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

project.ext.envConfigFiles = [
    debug: ".env",
    release: ".env.production",
]
apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

// Vector Icons
project.ext.vectoricons = [
    iconFontNames: [ 'MaterialIcons.ttf' ]
]
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "br.edu.ufcg.projeto1.buska"

    buildFeatures {
        buildConfig true
    }
    
    defaultConfig {
        applicationId "br.edu.ufcg.projeto1.buska"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        resValue "string", "build_config_package", "br.edu.ufcg.projeto1.buska"
    }

    signingConfigs {
        debug {
            def dFile = project.hasProperty('BUSKA_DEBUG_STORE_FILE') ? project.getProperty('BUSKA_DEBUG_STORE_FILE') : keystoreProperties["debug.storeFile"]
            def dPass = project.hasProperty('BUSKA_DEBUG_STORE_PASSWORD') ? project.getProperty('BUSKA_DEBUG_STORE_PASSWORD') : keystoreProperties["debug.storePassword"]
            def dAlias = project.hasProperty('BUSKA_DEBUG_KEY_ALIAS') ? project.getProperty('BUSKA_DEBUG_KEY_ALIAS') : keystoreProperties["debug.keyAlias"]
            def dKeyPass = project.hasProperty('BUSKA_DEBUG_KEY_PASSWORD') ? project.getProperty('BUSKA_DEBUG_KEY_PASSWORD') : keystoreProperties["debug.keyPassword"]

            storeFile file(dFile)
            storePassword dPass
            keyAlias dAlias
            keyPassword dKeyPass
        }

        release {
            def rFile = project.hasProperty('BUSKA_RELEASE_STORE_FILE') ? project.getProperty('BUSKA_RELEASE_STORE_FILE') : keystoreProperties["release.storeFile"]
            def rPass = project.hasProperty('BUSKA_RELEASE_STORE_PASSWORD') ? project.getProperty('BUSKA_RELEASE_STORE_PASSWORD') : keystoreProperties["release.storePassword"]
            def rAlias = project.hasProperty('BUSKA_RELEASE_KEY_ALIAS') ? project.getProperty('BUSKA_RELEASE_KEY_ALIAS') : keystoreProperties["release.keyAlias"]
            def rKeyPass = project.hasProperty('BUSKA_RELEASE_KEY_PASSWORD') ? project.getProperty('BUSKA_RELEASE_KEY_PASSWORD') : keystoreProperties["release.keyPassword"]

            if (rFile != null) {
                storeFile file(rFile)
                storePassword rPass
                keyAlias rAlias
                keyPassword rKeyPass
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // Use a suffix so both Dev and Prod can be installed at once
            applicationIdSuffix ".debug"
            resValue "string", "app_name", project.env.get("APP_NAME")
        }
        release {
            signingConfig signingConfigs.release

            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            resValue "string", "app_name", project.env.get("APP_NAME")
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
    
    implementation project(':react-native-config')
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
applyNativeModulesAppBuildGradle(project)