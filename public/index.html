<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projeto1 - React Native</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: #f5f5f5;
        }
        
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Container que simula um celular vertical */
        .phone-container {
            width: 375px;
            height: 812px;
            max-width: 100vw;
            max-height: 100vh;
            background: #000;
            border-radius: 25px;
            padding: 8px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 0 0 15px 15px;
            z-index: 10;
            pointer-events: none;
        }
        
        #app-root {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Responsivo - se a tela for menor que o celular */
        @media (max-width: 400px) {
            .phone-container {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                padding: 0;
            }
            
            .phone-screen {
                border-radius: 0;
            }
            
            .phone-notch {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="phone-container">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <div id="app-root"></div>
            </div>
        </div>
    </div>
</body>
</html>
