<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="BusKá - Gestão Municipal de Transporte Escolar">
    <meta name="theme-color" content="#0F2942">
    <title>BusKá - Transporte Escolar</title>
    
    <!-- Inter Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Material Icons (Rounded) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Round" rel="stylesheet">
    
    <style>
        /* Base Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Global Styles */
        html, body {
            height: 100%;
            overflow: hidden;
            background: #F8FAFC;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .phone-container {
            width: 375px;
            height: 812px;
            max-width: 100vw;
            max-height: 100vh;
            background: #000;
            border-radius: 25px;
            padding: 8px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 0 0 15px 15px;
            z-index: 10;
            pointer-events: none;
        }
        
        /* React Native Web Entry Point */
        #app-root {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        @media (max-width: 400px) {
            .phone-container { width: 100vw; height: 100vh; border-radius: 0; padding: 0; }
            .phone-screen { border-radius: 0; }
            .phone-notch { display: none; }
        }
    </style>
</head>
<body>
    <noscript>
        <div style="text-align: center; padding: 50px;">
            Você precisa ativar o JavaScript para visualizar o BusKá.
        </div>
    </noscript>

    <div id="root">
        <div class="phone-container">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <div id="app-root"></div>
            </div>
        </div>
    </div>
</body>
</html>
